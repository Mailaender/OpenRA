Background@ENCYCLOPEDIA_PANEL:
	Logic: EncyclopediaLogic
	X: (WINDOW_RIGHT - WIDTH) / 2
	Y: (WINDOW_BOTTOM - HEIGHT) / 2
	Width: 880
	Height: 280
	Children:
		Label@ENCYCLOPEDIA_TITLE:
			Y: 20
			Width: PARENT_RIGHT
			Height: 25
			Text: Mentat
			Align: Center
			Font: Bold
		ScrollPanel@ACTOR_LIST:
			X: 30
			Y: 60
			Width: 190
			Height: 150
			Children:
				ScrollItem@HEADER:
					BaseName: scrollheader
					Width: PARENT_RIGHT - 27
					Height: 13
					X: 2
					Visible: false
					Children:
						Label@LABEL:
							Font: TinyBold
							Width: PARENT_RIGHT
							Height: 13
							Align: Center
				ScrollItem@TEMPLATE:
					Width: PARENT_RIGHT - 27
					Height: 25
					X: 2
					EnableChildMouseOver: True
					Children:
						LabelWithTooltip@TITLE:
							X: 10
							Width: PARENT_RIGHT - 20
							Height: 25
							TooltipContainer: TOOLTIP_CONTAINER
							TooltipTemplate: SIMPLE_TOOLTIP
		Container@ACTOR_INFO:
			X: 235
			Y: 60
			Width: 642
			Height: 800
			Children:
				Background@ACTOR_BG:
					Width: 150
					Height: 150
					Background: dialog3
					Children:
						ActorPreview@ACTOR_PREVIEW:
							X: 1
							Y: 1
							Width: PARENT_RIGHT - 2
							Height: PARENT_BOTTOM - 2
				ScrollPanel@ACTOR_DESCRIPTION_PANEL:
					X: 155
					Width: 450
					Height: 150
					Children:
						Label@ACTOR_DESCRIPTION:
							X: 4
							Y: 4
							Width: PARENT_RIGHT - 32
							VAlign: Top
							Font: Small
		Button@BACK_BUTTON:
			X: PARENT_RIGHT - 140
			Y: PARENT_BOTTOM - 45
			Width: 120
			Height: 25
			Text: Back
			Font: Bold
			Key: escape
		TooltipContainer@TOOLTIP_CONTAINER:


